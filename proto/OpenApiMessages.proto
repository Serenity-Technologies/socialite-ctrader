/** Request for getting historical trend bars for the symbol. */
message ProtoOAGetTrendbarsReq {
    ProtoOAPayloadType payloadType = 1;

    int64 ctidTraderAccountId = 2; // Unique identifier of the trader's account. Used to match responses to trader's accounts.
    int64 fromTimestamp = 3; // The Unix time in milliseconds from which the search starts. Must be bigger or equal to zero (1st Jan 1970).
    int64 toTimestamp = 4; // The Unix time in milliseconds of finishing the search. Smaller or equal to 2147483646000 (19th Jan 2038).
    ProtoOATrendbarPeriod period = 5; // Specifies period of trend bar series (e.g. M1, M10, etc.).
    int64 symbolId = 6; // Unique identifier of the Symbol in cTrader platform.
    uint32 count = 7; // Limit number of trend bars in response back from toTimestamp.
