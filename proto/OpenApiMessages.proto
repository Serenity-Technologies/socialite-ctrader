    int64 timestamp = 4; // Simply don't use this field, as your original request already contains toTimestamp.
    repeated ProtoOATrendbar trendbar = 5; // The list of trend bars.
    int64 symbolId = 6; // Unique identifier of the Symbol in cTrader platform.
